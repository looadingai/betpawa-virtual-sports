services:
  - type: web
    name: betpawa
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: betpawa-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
      envVars:
  - key: TZ
    value: Africa/Nairobi
